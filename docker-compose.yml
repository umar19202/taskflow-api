services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=taskflow
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: taskflow_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: taskflow_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskflow
      MYSQL_ROOT_PASSWORD: secret
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - taskflow_db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: taskflow_redis
    restart: unless-stopped

volumes:
  taskflow_db_data:
